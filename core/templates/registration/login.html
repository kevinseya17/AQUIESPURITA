{% extends 'core/base.html' %}
{% load static crispy_forms_tags %}

{% block content %}
<!-- Fondo fijo -->
<div class="fixed-background" style="background-image: url('{% static 'core/img/vacas.png' %}');"></div>

<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh; margin-top: 80px;">
    <div class="login-glass-card shadow-lg p-5">
        <div class="text-center mb-4">
            <h2 class="fw-bold" style="color: var(--primary-green, #2e7d32);">
                <i class="fas fa-sign-in-alt me-2"></i> Iniciar Sesión
            </h2>
            <p class="text-muted">¡Qué bueno verte de nuevo!</p>
        </div>

        <form action="" method="post" class="auth-form">
            {% csrf_token %}
            
            <div class="form-container">
                {{ form | crispy }}
            </div>

            <div class="d-grid gap-3 mt-4">
                <button class="btn btn-auth btn-lg shadow-sm" type="submit">
                    Ingresar <i class="fas fa-arrow-right ms-2"></i>
                </button>
                
                <div class="d-flex justify-content-between mt-3 text-center">
                    <a href="{% url 'home' %}" class="text-muted text-decoration-none auth-link">
                        <i class="fas fa-home"></i> Volver
                    </a>
                    <a href="{% url 'register' %}" class="text-decoration-none auth-link" style="color: var(--primary-green);">
                        ¿No tienes cuenta? <strong>Regístrate</strong>
                    </a>
                </div>
            </div>
        </form>
    </div>
</div>

<style>
/* ============================
   Rediseño Login y Registro
============================ */
.fixed-background {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background-size: cover;
    background-position: center;
    z-index: -1;
    opacity: 0.6;
}

.login-glass-card {
    background: var(--glass-bg, rgba(255, 255, 255, 0.9));
    border-radius: var(--radius-lg, 20px);
    box-shadow: var(--shadow-lg, 0 15px 35px rgba(0,0,0,0.15));
    backdrop-filter: blur(16px);
    border: 1px solid var(--glass-border, rgba(255,255,255,0.4));
    width: 100%;
    max-width: 450px;
    animation: fadeIn 0.5s ease-out forwards;
}

.auth-form input {
    background-color: rgba(255, 255, 255, 0.6) !important;
    border: 1px solid rgba(0,0,0,0.1) !important;
    border-radius: 10px !important;
    padding: 12px 15px !important;
    transition: all 0.3s ease !important;
}

.auth-form input:focus {
    background-color: #fff !important;
    border-color: var(--primary-green, #2e7d32) !important;
    box-shadow: 0 0 0 0.25rem rgba(46, 125, 50, 0.2) !important;
}

.auth-form label {
    font-weight: 600;
    color: var(--text-dark, #2c3e50);
    margin-bottom: 8px;
}

.btn-auth {
    background-color: var(--primary-green, #2e7d32);
    color: white;
    border: none;
    border-radius: 50px;
    font-weight: 700;
    padding: 12px;
    transition: all 0.3s ease;
}

.btn-auth:hover {
    background-color: var(--hover-green, #1b5e20);
    transform: translateY(-2px);
    box-shadow: 0 8px 15px rgba(46, 125, 50, 0.3) !important;
    color: white;
}

.auth-link {
    transition: all 0.3s ease;
}
.auth-link:hover {
    opacity: 0.7;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>
{% endblock %}
